<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الكورولات - كلية الطب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ----- Header Styles ----- */
        header {
            background-color: var(--card-bg);
            box-shadow: var(--shadow-sm);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
        }
        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-dark);
        }
        header p {
            margin: 5px 0 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ----- Main Content ----- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        
        .calculator-card {
            background: var(--card-bg);
            max-width: 550px;
            width: 100%;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 30px;
            border: 1px solid var(--border);
        }

        /* ----- Step 1: Selection ----- */
        .step-container {
            transition: all 0.4s ease;
        }
        .step-1 {
            background-color: var(--primary-light);
            border: 2px dashed var(--primary);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }
        .step-1 label {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 15px;
        }
        
        select, input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        /* ----- Step 2: Inputs (Hidden initially) ----- */
        .step-2 {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .step-2.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .kurul-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            transition: transform 0.2s ease;
        }
        .kurul-group:hover {
            transform: scale(1.01);
            border-color: #cbd5e1;
        }
        .kurul-group label {
            font-weight: 700;
            color: var(--text-muted);
            width: 40%;
        }
        .kurul-group input {
            width: 55%;
            text-align: center;
        }

        /* ----- Button ----- */
        .calc-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .calc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
