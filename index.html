<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المعدل التراكمي | كلية الطب البشري</title>
    
    <!-- استدعاء خط Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- مكتبة تأثيرات الاحتفال -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-color: #0ea5e9; 
            --primary-dark: #0284c7;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            
            --success-bg: #dcfce7;
            --success-text: #166534;
            --success-border: #bbf7d0;
            
            --warning-bg: #fff7ed;    
            --warning-text: #c2410c;
            --warning-border: #ffedd5;
            
            --danger-bg: #fee2e2;     
            --danger-text: #991b1b;
            --danger-border: #fecaca;
            
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .header-section {
            background: var(--primary-dark);
            color: white;
            padding: 3rem 2rem 2rem 2rem;
            text-align: center;
            position: relative;
        }

        .header-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #38bdf8, #0284c7);
        }

        /* زر تبديل اللغة بإعدادات الظهور الصحيحة */
        .lang-switch {
            position: absolute;
            top: 15px;
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        [dir="rtl"] .lang-switch { left: 15px; right: auto; }
        [dir="ltr"] .lang-switch { right: 15px; left: auto; }

        .btn-lang {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn-lang:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .university-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #bae6fd;
            margin-bottom: 0.2rem;
        }

        .turkish-title {
            font-size: 0.9rem;
            color: #7dd3fc;
            letter-spacing: 1px;
        }

        .last-update {
            display: inline-block;
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .content-section {
            padding: 2rem;
        }

        .form-group {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .form-group:hover {
            border-color: #bae6fd;
            box-shadow: var(--shadow-sm);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 4px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            background-color: white;
            transition: all 0.3s ease;
            outline: none;
            cursor: pointer;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        .grades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1rem;
        }

        .result-box {
            padding: 1.2rem;
            border-radius: 10px;
            margin: 1rem 0;
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
            display: none;
        }

        .result-box.success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
        .result-box.warning { background: var(--warning-bg); color: var(--warning-text); border: 1px solid var(--warning-border); }
        .result-box.danger { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }

        .result-value {
            font-size: 1.4rem;
            display: inline-block;
            margin: 0 0.2rem;
            padding: 0.1rem 0.5rem;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 6px;
        }

        .hidden-section {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transform: translateY(-10px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0;
            padding: 0;
            border: none;
        }

        .visible-section {
            opacity: 1;
            max-height: 1200px;
            transform: translateY(0);
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .btn-reset {
            width: 100%;
            padding: 1rem;
            background: #cbd5e1;
            color: #334155;
            border: none;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-reset:hover {
            background: #94a3b8;
            color: white;
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .header-section { padding: 4rem 1rem 1.5rem 1rem; }
            h1 { font-size: 1.6rem; }
            .content-section { padding: 1rem; }
            .grades-grid { grid-template-columns: repeat(2, 1fr); }
            .form-group { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <header class="header-section">
            <!-- زر تغيير اللغة تم إضافته داخل الهيدر ليظهر دائماً -->
            <div class="lang-switch">
                <button id="btnToggleLang" class="btn-lang">🇹🇷 Türkçe</button>
            </div>

            <h1 data-i18n="title">حاسبة المعدل التراكمي</h1>
            <div class="university-title" data-i18n="univ">مخصص لكلية الطب البشري - جامعة الراعي</div>
            <div class="turkish-title">Sağlık Bilimleri Üniversitesi - Çobanbey Tıp Fakültesi</div>
            <div class="last-update" data-i18n="update">
                🕒 آخر تحديث: 26 يونيو 2026
            </div>
        </header>

        <div class="content-section">
            <div class="form-group">
                <div class="section-title" data-i18n="settingsTitle">تفاصيل السنة الدراسية</div>
                <label for="kurulCount" data-i18n="kurulLabel">حدد عدد الكورولات لهي السنة:</label>
                <select id="kurulCount">
                    <option value="" disabled selected data-i18n="selectDefault">اختار عدد الكورولات لنبدأ...</option>
                    <option value="4" data-i18n="k4">4 كورولات</option>
                    <option value="5" data-i18n="k5">5 كورولات</option>
                    <option value="6" data-i18n="k6">6 كورولات</option>
                    <option value="7" data-i18n="k7">7 كورولات</option>
                    <option value="8" data-i18n="k8">8 كورولات</option>
                </select>
            </div>

            <div id="kurulGroup" class="form-group hidden-section">
                <div class="section-title" data-i18n="kTitle">درجات الكورولات</div>
                <div id="kurulInputsContainer" class="grades-grid">
                    <!-- التوليد التلقائي -->
                </div>
            </div>

            <div id="coroResult" class="result-box"></div>

            <div id="finalExamSection" class="form-group hidden-section">
                <div class="section-title" data-i18n="fTitle">امتحان الفاينال</div>
                <label for="finalGrade" data-i18n="fLabel">سجل علامتك بالفاينال:</label>
                <input type="number" id="finalGrade" min="0" max="100" class="grade-input final-input" placeholder="0 - 100">
            </div>

            <div id="finalResult" class="result-box"></div>

            <div id="buttonlemaExamSection" class="form-group hidden-section">
                <div class="section-title" style="color: #ea580c;" data-i18n="bTitle">امتحان البوتونليما (التكميلي)</div>
                <label for="buttonlemaGrade" data-i18n="bLabel">سجل علامتك بالبوتونليما:</label>
                <input type="number" id="buttonlemaGrade" min="0" max="100" class="grade-input btn-input" placeholder="0 - 100">
            </div>

            <div id="buttonlemaResult" class="result-box"></div>

            <button id="resetBtn" class="btn-reset" data-i18n="resetBtn">تصفير وحساب من جديد ↻</button>
        </div>
    </div>

    <footer data-i18n="footer">
        تم التصميم والتطوير بواسطة الطالب خلدون الحمدو &copy; 2026
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // -- إعدادات اللغة (قاموس الترجمة) --
            let currentLang = 'ar';
            const dict = {
                title: { ar: "حاسبة المعدل التراكمي", tr: "Kurul Notu Hesaplayıcısı" },
                univ: { ar: "مخصص لكلية الطب البشري - جامعة الراعي", tr: "Çobanbey Tıp Fakültesi İçin Özel Hazırlanmıştır" },
                update: { ar: "🕒 آخر تحديث: 26 يونيو 2026", tr: "🕒 Son Güncelleme: 26 Haziran 2026" },
                settingsTitle: { ar: "تفاصيل السنة الدراسية", tr: "Eğitim Yılı Bilgileri" },
                kurulLabel: { ar: "حدد عدد الكورولات لهي السنة:", tr: "Bu yılki kurul sayısını seçin:" },
                selectDefault: { ar: "اختار عدد الكورولات لنبدأ...", tr: "Başlamak için kurul sayısını seçin..." },
                k4: { ar: "4 كورولات", tr: "4 Kurul" },
                k5: { ar: "5 كورولات", tr: "5 Kurul" },
                k6: { ar: "6 كورولات", tr: "6 Kurul" },
                k7: { ar: "7 كورولات", tr: "7 Kurul" },
                k8: { ar: "8 كورولات", tr: "8 Kurul" },
                kTitle: { ar: "درجات الكورولات", tr: "Kurul Notları" },
                fTitle: { ar: "امتحان الفاينال", tr: "Final Sınavı" },
                fLabel: { ar: "سجل علامتك بالفاينال:", tr: "Final notunuzu girin:" },
                bTitle: { ar: "امتحان البوتونليما (التكميلي)", tr: "Bütünleme Sınavı" },
                bLabel: { ar: "سجل علامتك بالبوتونليما:", tr: "Bütünleme notunuzu girin:" },
                resetBtn: { ar: "تصفير وحساب من جديد ↻", tr: "Sıfırla ve Yeniden Hesapla ↻" },
                footer: { ar: "تم التصميم والتطوير بواسطة الطالب خلدون الحمدو &copy; 2026", tr: "Öğrenci Haldun Alhamdo tarafından tasarlanmış ve geliştirilmiştir &copy; 2026" }
            };

            const toggleLangBtn = document.getElementById('btnToggleLang');

            const applyLanguage = () => {
                document.documentElement.lang = currentLang;
                document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
                toggleLangBtn.innerHTML = currentLang === 'ar' ? '🇹🇷 Türkçe' : '🇸🇾 العربية';

                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (dict[key]) {
                        if (el.tagName === 'OPTION') {
                            el.innerText = dict[key][currentLang];
                        } else {
                            el.innerHTML = dict[key][currentLang];
                        }
                    }
                });

                if (kurulCountSelect.value !== "") {
                    const values = Array.from(document.querySelectorAll('.kurul-input')).map(input => input.value);
                    generateKurulInputs(false); 
                    const inputs = document.querySelectorAll('.kurul-input');
                    values.forEach((val, i) => { if(inputs[i]) inputs[i].value = val; });
                    calculateResults();
                }
            };

            toggleLangBtn.addEventListener('click', () => {
                currentLang = currentLang === 'ar' ? 'tr' : 'ar';
                applyLanguage();
            });

            // -- متغيرات الواجهة --
            const kurulCountSelect = document.getElementById('kurulCount');
            const kurulGroup = document.getElementById('kurulGroup');
            const kurulInputsContainer = document.getElementById('kurulInputsContainer');
            const resetBtn = document.getElementById('resetBtn');

            const coroResultEl = document.getElementById('coroResult');
            const finalResultEl = document.getElementById('finalResult');
            const buttonlemaResultEl = document.getElementById('buttonlemaResult');
            
            const finalExamSection = document.getElementById('finalExamSection');
            const buttonlemaExamSection = document.getElementById('buttonlemaExamSection');
            
            const finalGradeInput = document.getElementById('finalGrade');
            const buttonlemaGradeInput = document.getElementById('buttonlemaGrade');

            let hasCelebrated = false;

            const triggerSuccessCelebration = () => {
                if (typeof confetti !== 'undefined') {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#0ea5e9', '#166534', '#fcd34d', '#f472b6'], zIndex: 9999 });
                }
            };

            const checkCelebration = (isPassing) => {
                if (isPassing && !hasCelebrated) {
                    triggerSuccessCelebration();
                    hasCelebrated = true; 
                } else if (!isPassing) {
                    hasCelebrated = false; 
                }
            };

            const blockInvalidChars = (e) => {
                if (['e', 'E', '+', '-', ' '].includes(e.key)) e.preventDefault();
                if (e.key === '.' && e.target.value.includes('.')) e.preventDefault();
                if (e.target.value === '100' && /^[0-9]$/.test(e.key)) e.preventDefault();
            };

            const validateInput = (e) => {
                let input = e.target;
                if (input.validity && input.validity.badInput) {
                    input.value = '';
                    calculateResults();
                    return;
                }
                if (input.value !== "") {
                    if (input.value.length > 5) input.value = input.value.slice(0, 5);
                    let val = parseFloat(input.value);
                    if (val > 100) input.value = 100;
                    else if (val < 0) input.value = 0;
                }
                calculateResults(); 
            };

            const generateKurulInputs = (shouldRecalculate = true) => {
                const count = parseInt(kurulCountSelect.value);
                if (isNaN(count)) return;

                kurulGroup.className = 'form-group visible-section';
                kurulInputsContainer.innerHTML = '';
                
                for (let i = 1; i <= count; i++) {
                    const div = document.createElement('div');
                    const labelTxt = currentLang === 'ar' ? `كورول ${i}:` : `Kurul ${i}:`;
                    div.innerHTML = `
                        <label for="coro${i}">${labelTxt}</label>
                        <input type="number" id="coro${i}" min="0" max="100" class="grade-input kurul-input" placeholder="0 - 100">
                    `;
                    kurulInputsContainer.appendChild(div);
                }

                document.querySelectorAll('.kurul-input').forEach(input => {
                    input.addEventListener('input', validateInput);
                    input.addEventListener('keydown', blockInvalidChars);
                });
                
                if (shouldRecalculate) calculateResults();
            };

            const getMsg = (key, req = '') => {
                const messages = {
                    avg: { ar: "معدل الكورولات:", tr: "Kurul Ortalaması:" },
                    passExempt: { 
                        ar: `🎉 ألف مبروك! النتيجة: <strong>ناجح (معفى)</strong>، ما في داعي تدخل الفاينال.`, 
                        tr: `🎉 Tebrikler! Sonuç: <strong>Başarılı (Muaf)</strong>, finale girmenize gerek yok.` 
                    },
                    failFinalImpos: { 
                        ar: `❌ الوضع صعب شوي: محتاج تجيب <span class="result-value">${req}</span> بالفاينال وهالشي مستحيل. للأسف <strong>راسب بالفاينال حكماً</strong>.`, 
                        tr: `❌ Durum kritik: Finalde <span class="result-value">${req}</span> almanız gerekiyor ve bu imkansız. Maalesef <strong>finalden kaldınız</strong>.` 
                    },
                    warnFinal: { 
                        ar: `⚠️ انتبه: وضعك لسا مو بالسليم ولازم تدخل الفاينال! أقل علامة للنجاح هي: <span class="result-value">${req}</span>`, 
                        tr: `⚠️ Dikkat: Henüz güvende değilsiniz ve finale girmeniz şart! Geçmek için minimum not: <span class="result-value">${req}</span>` 
                    },
                    finalCurrent: { ar: "معدلك النهائي صار:", tr: "Final sonrası ortalamanız:" },
                    finalPass: { ar: "🎓 <strong>النتيجة: ناجح</strong>، ألف مبروك.", tr: "🎓 <strong>Sonuç: Başarılı</strong>, tebrikler." },
                    finalFail: { ar: "للأسف ما قدرت تتجاوز الفاينال.", tr: "Maalesef finali geçemediniz." },
                    reqButon: { 
                        ar: `لازم تدخل البوتونليما. علامتك المطلوبة للنجاح هي: <span class="result-value">${req}</span>`, 
                        tr: `Bütünlemeye girmeniz gerekiyor. Geçmek için gereken not: <span class="result-value">${req}</span>` 
                    },
                    butonFinal: { ar: "معدلك النهائي بعد البوتونليما:", tr: "Bütünleme sonrası ortalamanız:" },
                    butonPass: { ar: "🎓 <strong>النتيجة: ناجح</strong>، خلصت السنة على خير!", tr: "🎓 <strong>Sonuç: Başarılı</strong>, yılı atlattınız!" },
                    butonFail: { ar: "❌ <strong>النتيجة: راسب</strong>. معوضة إن شاء الله بالسنة الجاية.", tr: "❌ <strong>Sonuç: Başarısız</strong>. Seneye başarılar dileriz." }
                };
                return messages[key][currentLang];
            };

            const calculateResults = () => {
                resetResultSections();
                let isCurrentlyPassing = false; 

                const kurulInputs = Array.from(document.querySelectorAll('.kurul-input'));
                const coroGrades = kurulInputs.map(input => parseFloat(input.value));
                
                if (coroGrades.some(isNaN) || coroGrades.length === 0) {
                    checkCelebration(false);
                    return;
                }

                const averageCoro = coroGrades.reduce((sum, grade) => sum + grade, 0) / coroGrades.length;
                coroResultEl.style.display = 'block';
                
                if (averageCoro >= 80) {
                    coroResultEl.className = 'result-box success';
                    coroResultEl.innerHTML = `${getMsg('avg')} <span class="result-value">${averageCoro.toFixed(2)}</span><br>${getMsg('passExempt')}`;
                    isCurrentlyPassing = true;
                    checkCelebration(isCurrentlyPassing);
                    return;
                }

                finalExamSection.className = 'form-group visible-section';
                const minFinalGrade = (60 - (0.60 * averageCoro)) / 0.40;
                
                if (minFinalGrade > 100) {
                    coroResultEl.className = 'result-box danger';
                    coroResultEl.innerHTML = `${getMsg('avg')} <span class="result-value">${averageCoro.toFixed(2)}</span><br>${getMsg('failFinalImpos', minFinalGrade.toFixed(2))}`;
                    showButtonlema(minFinalGrade, averageCoro);
                    return;
                }

                coroResultEl.className = 'result-box warning';
                coroResultEl.innerHTML = `${getMsg('avg')} <span class="result-value">${averageCoro.toFixed(2)}</span><br>${getMsg('warnFinal', minFinalGrade.toFixed(2))}`;

                const finalGrade = parseFloat(finalGradeInput.value);
                if (isNaN(finalGrade)) {
                    checkCelebration(false);
                    return; 
                }

                const finalCombined = (0.60 * averageCoro) + (0.40 * finalGrade);
                finalResultEl.style.display = 'block';

                if (finalCombined >= 60) {
                    finalResultEl.className = 'result-box success';
                    finalResultEl.innerHTML = `${getMsg('finalCurrent')} <span class="result-value">${finalCombined.toFixed(2)}</span><br>${getMsg('finalPass')}`;
                    isCurrentlyPassing = true;
                    checkCelebration(isCurrentlyPassing);
                    return;
                }

                finalResultEl.className = 'result-box danger';
                finalResultEl.innerHTML = `${getMsg('finalCurrent')} <span class="result-value">${finalCombined.toFixed(2)}</span><br>${getMsg('finalFail')}`;
                showButtonlema(minFinalGrade, averageCoro);
            };

            const showButtonlema = (minReqGrade, averageCoro) => {
                buttonlemaExamSection.className = 'form-group visible-section';
                finalResultEl.innerHTML += `<br>${getMsg('reqButon', minReqGrade.toFixed(2))}`;

                const buttonlemaGrade = parseFloat(buttonlemaGradeInput.value);
                if (isNaN(buttonlemaGrade)) {
                    checkCelebration(false);
                    return;
                }

                const buttonlemaCombined = (0.60 * averageCoro) + (0.40 * buttonlemaGrade);
                buttonlemaResultEl.style.display = 'block';

                if (buttonlemaCombined >= 60) {
                    buttonlemaResultEl.className = 'result-box success';
                    buttonlemaResultEl.innerHTML = `${getMsg('butonFinal')} <span class="result-value">${buttonlemaCombined.toFixed(2)}</span><br>${getMsg('butonPass')}`;
                    checkCelebration(true);
                } else {
                    buttonlemaResultEl.className = 'result-box danger';
                    buttonlemaResultEl.innerHTML = `${getMsg('butonFinal')} <span class="result-value">${buttonlemaCombined.toFixed(2)}</span><br>${getMsg('butonFail')}`;
                    checkCelebration(false);
                }
            };

            const resetResultSections = () => {
                [coroResultEl, finalResultEl, buttonlemaResultEl].forEach(el => {
                    el.style.display = 'none';
                    el.innerHTML = '';
                    el.className = 'result-box';
                });
                finalExamSection.className = 'form-group hidden-section';
                buttonlemaExamSection.className = 'form-group hidden-section';
            };

            const resetAll = () => {
                kurulCountSelect.value = ""; 
                kurulGroup.className = 'form-group hidden-section'; 
                kurulInputsContainer.innerHTML = '';
                hasCelebrated = false;
                resetResultSections();
                finalGradeInput.value = '';
                buttonlemaGradeInput.value = '';
            };

            kurulCountSelect.addEventListener('change', () => {
                resetResultSections();
                finalGradeInput.value = '';
                buttonlemaGradeInput.value = '';
                hasCelebrated = false;
                generateKurulInputs();
            });
            
            finalGradeInput.addEventListener('input', validateInput);
            finalGradeInput.addEventListener('keydown', blockInvalidChars);
            
            buttonlemaGradeInput.addEventListener('input', validateInput);
            buttonlemaGradeInput.addEventListener('keydown', blockInvalidChars);
            
            resetBtn.addEventListener('click', resetAll);
        });
    </script>
</body>
</html>
