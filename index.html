<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الكورولات - كلية الطب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--card-bg); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 25px 20px; text-align: center; border-bottom: 4px solid var(--primary); }
        header h1 { margin: 0; font-size: 1.8rem; font-weight: 800; color: var(--primary-dark); }
        header p { margin: 5px 0 0; font-size: 1.1rem; color: var(--text-muted); font-weight: 600; }
        .univ-info { font-size: 0.9rem; color: #475569; margin-top: 10px; font-weight: 700; }
        main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; }
        .calculator-card { background: var(--card-bg); max-width: 550px; width: 100%; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 30px; border: 1px solid var(--border); }
        .step-1 { background-color: var(--primary-light); border: 2px dashed var(--primary); padding: 25px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .step-1 label { display: block; font-size: 1.2rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 15px; }
        select, input { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 1.1rem; font-family: 'Cairo', sans-serif; outline: none; box-sizing: border-box; }
        .step-2 { display: none; }
        .step-2.active { display: block; }
        .section-title { font-size: 1.2rem; font-weight: 800; color: var(--primary-dark); margin: 25px 0 15px 0; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .kurul-group { display: flex; align-items: center; justify-content: space-between; background: #fdfdfd; padding: 12px 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); }
        .result-box { margin-top: 15px; padding: 15px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 1.1rem; display: none; }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid var(--success); }
        .warning { background-color: #fef3c7; color: #92400e; border: 1px solid var(--warning); }
        .danger { background-color: #fee2e2; color: #991b1b; border: 1px solid var(--danger); }
        footer { background-color: var(--text-main); color: #f1f5f9; text-align: center; padding: 20px; font-size: 1rem; margin-top: auto; }
    </style>
</head>
<body>

    <header>
        <h1>حاسبة الكورولات - كلية الطب البشري</h1>
        <p>Çobanbey Tıp Fakültesi | Sağlık Bilimleri Üniversitesi</p>
        <div class="univ-info">تاريخ التعديل الأخير: 26 يونيو 2026</div>
    </header>

    <main>
        <div class="calculator-card">
            <div class="step-1" id="step1Box">
                <label id="step1Label" for="kurulCount">الخطوة الأولى: حدد عدد الكورولات</label>
                <select id="kurulCount" onchange="generateKurulInputs()">
                    <option value="" disabled selected>-- اختر العدد --</option>
                    <option value="4">4 كورولات</option><option value="5">5 كورولات</option>
                    <option value="6">6 كورولات</option><option value="7">7 كورولات</option>
                    <option value="8">8 كورولات</option>
                </select>
            </div>

            <div class="step-2" id="step2Box">
                <div class="section-title">درجات الكورولات</div>
                <div id="kurulInputsContainer"></div>
                <div id="kurulResult" class="result-box"></div>
                
                <div id="finalSection" style="display:none;">
                    <div class="section-title">امتحان الفاينال</div>
                    <input type="number" id="finalScore" placeholder="درجة الفاينال (0 - 100)" oninput="calculateOverall()">
                    <div id="finalResult" class="result-box"></div>
                </div>

                <div id="butunlemeSection" style="display:none;">
                    <div class="section-title">امتحان البوتونليما</div>
                    <input type="number" id="butunlemeScore" placeholder="درجة البوتونليما (0 - 100)" oninput="calculateOverall()">
                    <div id="butunlemeResult" class="result-box"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>تصميم وتطوير: الطالب <span>خلدون الحمدو</span></p>
        <p>كل الحقوق محفوظة © 2026</p>
    </footer>

    <script>
        function generateKurulInputs() {
            const count = document.getElementById('kurulCount').value;
            const container = document.getElementById('kurulInputsContainer');
            container.innerHTML = '';
            document.getElementById('step2Box').classList.add('active');
            for (let i = 1; i <= count; i++) {
                container.innerHTML += `<div class="kurul-group"><label>الكورول ${i}</label><input type="number" id="kurul_${i}" oninput="calculateOverall()"></div>`;
            }
        }

        function calculateOverall() {
            const count = parseInt(document.getElementById('kurulCount').value);
            let sum = 0, filled = 0;
            for (let i = 1; i <= count; i++) {
                let val = document.getElementById(`kurul_${i}`).value;
                if (val !== '') { sum += parseFloat(val); filled++; }
            }
            if (filled < count) return;

            let kurulAvg = sum / count;
            document.getElementById('kurulResult').style.display = 'block';
            document.getElementById('kurulResult').innerHTML = `متوسط الكورولات: ${kurulAvg.toFixed(2)}`;
            
            document.getElementById('finalSection').style.display = 'block';
            let fVal = document.getElementById('finalScore').value;
            if (fVal !== '') {
                let fAvg = (kurulAvg * 0.6) + (parseFloat(fVal) * 0.4);
                document.getElementById('finalResult').style.display = 'block';
                document.getElementById('finalResult').className = fAvg >= 60 ? 'result-box success' : 'result-box warning';
                document.getElementById('finalResult').innerHTML = fAvg >= 60 ? `المعدل: ${fAvg.toFixed(2)} - ناجح 🎉` : `المعدل: ${fAvg.toFixed(2)} - ركز على البوتونليما ⚠️`;
                
                if (fAvg < 60) {
                    document.getElementById('butunlemeSection').style.display = 'block';
                    let bVal = document.getElementById('butunlemeScore').value;
                    if (bVal !== '') {
                        let bAvg = (kurulAvg * 0.6) + (parseFloat(bVal) * 0.4);
                        document.getElementById('butunlemeResult').style.display = 'block';
                        document.getElementById('butunlemeResult').className = bAvg >= 60 ? 'result-box success' : 'result-box danger';
                        document.getElementById('butunlemeResult').innerHTML = bAvg >= 60 ? `المعدل النهائي: ${bAvg.toFixed(2)} - ناجح 🎉` : `المعدل النهائي: ${bAvg.toFixed(2)} - للأسف راسب ❌`;
                    }
                }
            }
        }
    </script>
</body>
</html>
